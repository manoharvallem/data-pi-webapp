name: Deploy App to GKE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Build and push backend image
      uses: docker/build-push-action@v2
      with:
        context: ./app/backend
        push: true
        tags: gcr.io/data-pi-dev/data-pi-backend:latest

    - name: Build and push frontend image
      uses: docker/build-push-action@v2
      with:
        context: ./app/frontend
        push: true
        tags: gcr.io/data-pi-dev/data-pi-frontend:latest

    - name: Set up kubectl
      uses: google-github-actions/setup-gcloud@v0.6.0
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: data-pi-dev

    - name: Deploy to GKE
      run: |
        gcloud container clusters get-credentials data-pi-cluster --zone asia-south1-a --project data-pi-dev
        kubectl apply -f infra/k8s-manifests.yaml