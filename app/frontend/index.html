<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data-Pi Web App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px; }
        #posts { border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
    <h1>Data-Pi Web App</h1>
    <form id="postForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="message" placeholder="Your Post (160 chars max)" maxlength="160" required>
        <button type="submit">Submit Post</button>
    </form>
    <div id="posts">
        <h2>Posts</h2>
        <div id="postList"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
